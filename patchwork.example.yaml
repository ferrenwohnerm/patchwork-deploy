# patchwork.yaml — Example configuration for patchwork-deploy
# Copy this file to patchwork.yaml and adjust to your project.

version: "1"

# Human-readable project identifier used in logs and deployment records.
project: my-service

environments:
  # ── Staging ──────────────────────────────────────────────────────────────
  - name: staging
    base_url: https://staging.my-service.example.com
    variables:
      LOG_LEVEL: debug
      REPLICAS: "2"
      FEATURE_FLAGS: "new-ui,beta-api"

  # ── Production ───────────────────────────────────────────────────────────
  - name: production
    base_url: https://my-service.example.com
    variables:
      LOG_LEVEL: warn
      REPLICAS: "5"
      FEATURE_FLAGS: ""

  # ── Canary ───────────────────────────────────────────────────────────────
  # Optional: route a small percentage of traffic to a new version before
  # promoting fully to production.
  # - name: canary
  #   base_url: https://canary.my-service.example.com
  #   variables:
  #     LOG_LEVEL: info
  #     REPLICAS: "1"
  #     FEATURE_FLAGS: "new-ui,beta-api"
